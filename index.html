<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buildora | Advanced Build Studio</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #09090b;
            --bg-panel: #121215;
            --border-color: #27272a;
            --text-main: #e4e4e7;
            --text-muted: #a1a1aa;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-glow: 0 0 20px rgba(168, 85, 247, 0.4);
            --font-ui: 'Inter', sans-serif;
            --font-code: 'Fira Code', monospace;
            --success: #22c55e;
            --working: #eab308;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-ui);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* --- Layout Columns --- */
        .col-sidebar {
            width: 320px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            flex-shrink: 0;
            z-index: 10;
        }

        .col-editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            background: #0d0d10;
            min-width: 0;
        }

        .col-preview {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            min-width: 0;
        }

        /* --- Sidebar Elements --- */
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
        }
        .brand-icon {
            font-size: 1.5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand-text {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
        }
        .pro-badge {
            font-size: 0.6rem;
            background: #27272a;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #3f3f46;
            color: var(--text-muted);
            margin-left: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-grow: 1;
        }
        
        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        textarea.prompt-input {
            width: 100%;
            height: 100%;
            background: #18181b;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            padding: 1rem;
            font-family: var(--font-ui);
            font-size: 0.9rem;
            resize: none;
            transition: border 0.2s;
            outline: none;
        }
        textarea.prompt-input:focus {
            border-color: #a855f7;
        }

        .btn-build {
            margin-top: 1.5rem;
            background: var(--accent-gradient);
            border: none;
            color: white;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-build:hover {
            box-shadow: var(--accent-glow);
            transform: translateY(-1px);
        }
        .btn-build:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-panel {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #52525b;
            transition: background-color 0.3s;
        }
        .dot.active { background-color: var(--working); box-shadow: 0 0 8px var(--working); animation: pulse 1s infinite; }
        .dot.success { background-color: var(--success); box-shadow: 0 0 8px var(--success); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #27272a;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 5px;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-gradient);
            transition: width 0.2s;
        }

        .powered-by {
            font-size: 0.7rem;
            color: #52525b;
            text-align: center;
            margin-top: 1rem;
        }

        /* --- Editor Panel --- */
        .panel-header {
            height: 50px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            background: var(--bg-panel);
        }
        .panel-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-icon {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-icon:hover {
            background: #27272a;
            color: var(--text-main);
        }

        .editor-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
        }

        .line-numbers {
            width: 40px;
            background: #0d0d10;
            color: #52525b;
            text-align: right;
            padding: 10px 5px;
            font-family: var(--font-code);
            font-size: 13px;
            line-height: 1.5;
            user-select: none;
            border-right: 1px solid #27272a;
            overflow: hidden;
        }

        #code-editor {
            flex: 1;
            background: transparent;
            color: #d4d4d8;
            border: none;
            padding: 10px;
            font-family: var(--font-code);
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
            white-space: pre;
            overflow: auto;
            tab-size: 2;
        }

        /* --- Preview Panel --- */
        .preview-toolbar {
            height: 50px;
            background: #f4f4f5; /* Light grey for browser chrome */
            display: flex;
            align-items: center;
            padding: 0 1rem;
            justify-content: space-between;
            border-bottom: 1px solid #e4e4e7;
        }
        .dark-mode-preview .preview-toolbar {
             background: #18181b;
             border-bottom: 1px solid #27272a;
        }

        .window-dots {
            display: flex;
            gap: 6px;
        }
        .win-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-red { background: #ef4444; }
        .dot-yellow { background: #eab308; }
        .dot-green { background: #22c55e; }

        .preview-area {
            flex: 1;
            background: white;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Syntax Highlighting overrides (simple) */
        ::selection { background: rgba(168, 85, 247, 0.3); }
    </style>
</head>
<body>

    <!-- LEFT SIDEBAR -->
    <div class="col-sidebar">
        <div class="brand">
            <i class="fa-solid fa-cube brand-icon"></i>
            <span class="brand-text">Buildora</span>
            <span class="pro-badge">PRO STUDIO</span>
        </div>

        <div class="input-group">
            <label for="system-prompt">PROMPT</label>
            <textarea id="system-prompt" class="prompt-input" placeholder="Describe your website... (e.g., A futuristic landing page for a coffee shop with neon visuals)">Create a modern, responsive landing page for a photography portfolio with a dark theme and masonry grid layout.</textarea>
        </div>

        <button id="btn-start" class="btn-build">
            <i class="fa-solid fa-bolt"></i> Start Building
        </button>

        <div class="status-panel">
            <div class="status-row">
                <span>Status</span>
                <div class="status-indicator">
                    <span id="status-text">Idle</span>
                    <div id="status-dot" class="dot"></div>
                </div>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="powered-by">
                Powered by Qwen Coder & OpenRouter
            </div>
        </div>
    </div>

    <!-- MIDDLE PANEL: EDITOR -->
    <div class="col-editor">
        <div class="panel-header">
            <div class="panel-title">
                <i class="fa-solid fa-code"></i> Live Editor
            </div>
            <button class="btn-icon" id="btn-copy">
                <i class="fa-regular fa-copy"></i> Copy Code
            </button>
        </div>
        <div class="editor-container">
            <div class="line-numbers" id="line-numbers">1</div>
            <textarea id="code-editor" spellcheck="false" placeholder="// Code will stream here..."></textarea>
        </div>
    </div>

    <!-- RIGHT PANEL: PREVIEW -->
    <div class="col-preview">
        <div class="preview-toolbar">
            <div class="window-dots">
                <div class="win-dot dot-red"></div>
                <div class="win-dot dot-yellow"></div>
                <div class="win-dot dot-green"></div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn-icon" id="btn-download" style="background: white; border-color: #d4d4d8;">
                    <i class="fa-solid fa-download"></i> .html
                </button>
                <button class="btn-icon" id="btn-fullscreen" style="background: white; border-color: #d4d4d8;">
                    <i class="fa-solid fa-expand"></i>
                </button>
            </div>
        </div>
        <div class="preview-area">
            <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-forms allow-same-origin"></iframe>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const API_KEY = "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";
        const API_URL = "https://openrouter.ai/api/v1/chat/completions";
        const MODEL = "qwen/qwen3-coder:free";

        // --- DOM Elements ---
        const btnStart = document.getElementById('btn-start');
        const promptInput = document.getElementById('system-prompt');
        const editor = document.getElementById('code-editor');
        const lineNumbers = document.getElementById('line-numbers');
        const iframe = document.getElementById('preview-frame');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');
        const btnCopy = document.getElementById('btn-copy');
        const btnDownload = document.getElementById('btn-download');
        const btnFullscreen = document.getElementById('btn-fullscreen');

        // --- State ---
        let isGenerating = false;
        let generatedCode = "";

        // --- Event Listeners ---
        btnStart.addEventListener('click', startBuild);
        
        // Sync scroll and line numbers
        editor.addEventListener('scroll', () => {
            lineNumbers.scrollTop = editor.scrollTop;
        });
        
        editor.addEventListener('input', () => {
            updateLineNumbers();
            updatePreview(editor.value);
        });

        // Copy functionality
        btnCopy.addEventListener('click', () => {
            navigator.clipboard.writeText(editor.value).then(() => {
                const originalText = btnCopy.innerHTML;
                btnCopy.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                setTimeout(() => btnCopy.innerHTML = originalText, 2000);
            });
        });

        // Download functionality
        btnDownload.addEventListener('click', () => {
            if (!editor.value) return;
            const blob = new Blob([editor.value], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            a.click();
            URL.revokeObjectURL(url);
        });

        // Fullscreen functionality
        btnFullscreen.addEventListener('click', () => {
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.webkitRequestFullscreen) {
                iframe.webkitRequestFullscreen(); // Safari
            }
        });

        // --- Logic Functions ---

        function updateLineNumbers() {
            const lines = editor.value.split('\n').length;
            lineNumbers.innerHTML = Array(lines).fill(0).map((_, i) => i + 1).join('<br>');
        }

        function cleanCode(raw) {
            // Remove markdown code blocks if present
            let clean = raw.replace(/^```html\s*/i, '').replace(/^```\s*/i, '');
            // Remove trailing markdown close
            clean = clean.replace(/```\s*$/, '');
            return clean;
        }

        function updatePreview(code) {
            const cleaned = cleanCode(code);
            iframe.srcdoc = cleaned;
        }

        async function startBuild() {
            if (isGenerating) return;
            const userPrompt = promptInput.value.trim();
            if (!userPrompt) return alert("Please enter a prompt.");

            // UI Reset
            isGenerating = true;
            btnStart.disabled = true;
            btnStart.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Building...';
            statusDot.className = "dot active";
            statusText.innerText = "Generating";
            progressFill.style.width = "10%"; // Indeterminate start
            editor.value = "";
            generatedCode = "";
            updateLineNumbers();

            // Construct Payload strictly as requested
            const payload = {
                model: MODEL,
                messages: [
                    {
                        role: "system",
                        content: "You are an expert web developer. You must generate a SINGLE, COMPLETE HTML file containing internal CSS within <style> tags and internal JS within <script> tags. Do not output explanations, only the code."
                    },
                    {
                        role: "user",
                        content: [
                            {
                                type: "text",
                                text: userPrompt
                            }
                        ]
                    }
                ],
                stream: true
            };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`API Error: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = ""; // To hold partial chunks

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    buffer += chunk;
                    
                    // SSE Format: data: {...} \n\n
                    const lines = buffer.split('\n');
                    
                    // Keep the last incomplete line in the buffer
                    buffer = lines.pop();

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (trimmed.startsWith("data: ")) {
                            const dataStr = trimmed.slice(6);
                            if (dataStr === "[DONE]") continue;

                            try {
                                const json = JSON.parse(dataStr);
                                const delta = json.choices[0]?.delta?.content;
                                if (delta) {
                                    generatedCode += delta;
                                    
                                    // Live Typing Effect
                                    editor.value = generatedCode;
                                    
                                    // Auto Scroll Editor
                                    editor.scrollTop = editor.scrollHeight;
                                    
                                    // Sync UI
                                    updateLineNumbers();
                                    
                                    // Update Preview (Debounced slightly naturally by stream speed, but doing it every chunk for 'Live' feel)
                                    updatePreview(generatedCode);
                                    
                                    // Simulate progress bar based on length (arbitrary cap for visual effect)
                                    let prog = Math.min((generatedCode.length / 2000) * 100, 95);
                                    progressFill.style.width = `${prog}%`;
                                }
                            } catch (e) {
                                console.warn("Stream parse error", e);
                            }
                        }
                    }
                }

                // Finalize
                progressFill.style.width = "100%";
                statusDot.className = "dot success";
                statusText.innerText = "Completed";
                btnStart.innerHTML = '<i class="fa-solid fa-check"></i> Done';
                setTimeout(() => {
                    btnStart.disabled = false;
                    btnStart.innerHTML = '<i class="fa-solid fa-bolt"></i> Start Building';
                    isGenerating = false;
                }, 2000);

            } catch (error) {
                console.error(error);
                statusText.innerText = "Error";
                statusDot.style.backgroundColor = "red";
                editor.value = `// Error generating code:\n// ${error.message}`;
                btnStart.disabled = false;
                btnStart.innerHTML = '<i class="fa-solid fa-bolt"></i> Retry';
                isGenerating = false;
            }
        }
    </script>
</body>
</html>
